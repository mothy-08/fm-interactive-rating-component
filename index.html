<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Interactive rating component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <main>
      <form aria-labelledby="main-heading">
        <header>
          <div class="image-wrapper">
            <img
              src="images/icon-star.svg"
              alt=""
              aria-hidden="true"
              width="17"
              height="16"
            />
          </div>
        </header>

        <h1 id="main-heading">How did we do?</h1>
        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>

        <fieldset>
          <legend class="sr-only">Rating</legend>
          <ul role="list">
            <li>
              <input type="radio" name="rating" id="r1" value="1" />
              <label for="r1">1</label>
            </li>
            <li>
              <input type="radio" name="rating" id="r2" value="2" />
              <label for="r2">2</label>
            </li>
            <li>
              <input type="radio" name="rating" id="r3" value="3" />
              <label for="r3">3</label>
            </li>
            <li>
              <input type="radio" name="rating" id="r4" value="4" />
              <label for="r4">4</label>
            </li>
            <li>
              <input type="radio" name="rating" id="r5" value="5" />
              <label for="r5">5</label>
            </li>
          </ul>
        </fieldset>

        <button type="submit">Submit</button>
      </form>
    </main>

    <!-- Thank you state start -->

    <!-- out of 5 Thank you! We appreciate you taking the time to give a rating. If -->
    <!-- you ever need more support, don’t hesitate to get in touch! -->

  </body>
</html>
